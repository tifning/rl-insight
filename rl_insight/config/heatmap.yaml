# Heatmap visualization preset

pipeline:
  type: OfflineInsightPipeline  # OfflineInsightPipeline

input:
  rank_list: all               # Rank id list, e.g. '0,1,2' or 'all'

output:
  path: output                 # Output directory path

heatmap:
  parser:
    type: gmm                  # gmm
    step: null                 # Step filter, e.g. '1' or '1,2'
    role: null                 # Role filter
  visualizer:
    type: gmm_heatmap          # gmm_heatmap
    dpi: 200                   # DPI for heatmap PNG output
    cmap: viridis              # Matplotlib colormap name
    gmm_per_layer: 3           # Grouped matmul count per MoE layer
