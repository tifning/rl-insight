# Observability stack for `rl-insight server start/stop` (`load_server_config_file`).

server:
  enable: true
  backend: docker_compose
  compose_file: docker-compose.yaml
  project_name: rl-insight-monitor

prometheus:
  enable: true
  prometheus_port: 9090
  config_file: prometheus.yml

otel:
  traces_endpoint: http://127.0.0.1:4318/v1/traces

tempo:
  enable: true
  query_port: 3200
  config_file: tempo.yaml

grafana:
  enable: true
  port: 3000
  config_file: grafana.ini
  provisioning_dir: provisioning
  dashboards_dir: dashboards
